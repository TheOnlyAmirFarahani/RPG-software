name: Legends CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:

  auth-service:
    name: Auth Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: pytest test_main.py -v

  battle-service:
    name: Battle Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: battle-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: pytest test_main.py -v

  pve-service:
    name: PvE Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pve-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: pytest test_main.py -v

  pvp-service:
    name: PvP Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pvp-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: pytest test_main.py -v

  gateway:
    name: Gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: pytest test_main.py -v

  integration:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: [auth-service, battle-service, pve-service, pvp-service, gateway]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build
      - name: Wait for gateway
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/scores/hall-of-fame && echo "Gateway up" && break
            echo "Waiting ($i)..."; sleep 3
          done
      - name: Register
        run: |
          S=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8080/auth/register \
            -H "Content-Type: application/json" -d '{"username":"smoke","password":"pass"}')
          echo "Register: $S"; [ "$S" = "201" ]
      - name: Login
        run: |
          R=$(curl -s -X POST http://localhost:8080/auth/login \
            -H "Content-Type: application/json" -d '{"username":"smoke","password":"pass"}')
          echo "$R" | grep -q "token" && echo "Login OK"
      - name: Protected without token is 401
        run: |
          S=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/pve/campaign/x)
          [ "$S" = "401" ] && echo "Auth guard OK"
      - if: always()
        run: docker compose logs
      - if: always()
        run: docker compose down

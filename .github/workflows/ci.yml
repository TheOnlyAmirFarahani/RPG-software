name: Legends CI/CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:

  auth-service:
    name: "Unit – Auth Service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: pytest test_main.py -v

  battle-service:
    name: "Unit – Battle Service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: battle-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: pytest test_main.py -v

  pve-service:
    name: "Unit – PvE Service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pve-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: pytest test_main.py -v

  pvp-service:
    name: "Unit – PvP Service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pvp-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: pytest test_main.py -v

  gateway:
    name: "Unit – Gateway"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: pytest test_main.py -v


  integration:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: [auth-service, battle-service, pve-service, pvp-service, gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose up -d --build
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r tests/requirements.txt
      - name: Wait for gateway
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:8080/scores/hall-of-fame && echo "Gateway ready" && exit 0
            echo "attempt $i – sleeping 3s"; sleep 3
          done
          echo "Gateway timed out"; docker compose logs; exit 1
      - name: Run integration tests
        env:
          GATEWAY_URL: http://localhost:8080
        run: pytest tests/integration/test_integration.py -v --tb=short
      - if: failure()
        run: docker compose logs
      - if: always()
        run: docker compose down -v


  system:
    name: "System Tests"
    runs-on: ubuntu-latest
    needs: [integration]
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose up -d --build
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r tests/requirements.txt
      - name: Wait for gateway
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:8080/scores/hall-of-fame && echo "Gateway ready" && exit 0
            echo "attempt $i – sleeping 3s"; sleep 3
          done
          echo "Gateway timed out"; docker compose logs; exit 1
      - name: Run system tests
        env:
          GATEWAY_URL: http://localhost:8080
        run: pytest tests/system/test_system.py -v --tb=short
      - if: failure()
        run: docker compose logs
      - if: always()
        run: docker compose down -v


